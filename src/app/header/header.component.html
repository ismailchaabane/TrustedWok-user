<header class="header">
    <div class="header-left">
        <h1>Tableau de bord</h1>
        <span class="breadcrumb">Accueil / Tableau de bord</span>
    </div>

    <div class="header-right">
        <!-- Theme Toggle -->
        <button class="theme-toggle" (click)="toggleTheme()"
            [attr.aria-label]="isDarkMode ? 'Mode clair' : 'Mode sombre'">
            <svg *ngIf="isDarkMode" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg *ngIf="!isDarkMode" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>

        <!-- Notifications -->
        <button class="hdr-icon-btn" aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notif-dot">3</span>
        </button>

        <!-- Separator -->
        <div class="hdr-sep"></div>

        <!-- User -->
        <div class="hdr-user">
            <div class="user-avatar"
                [style.background]="'linear-gradient(135deg, ' + currentRoleInfo.color + ', ' + currentRoleInfo.color + '99)'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f0f14" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-meta">
                <span class="user-name">Admin TW</span>
                <span class="user-role">{{ currentRoleInfo.description }}</span>
            </div>
        </div>
    </div>
</header>
