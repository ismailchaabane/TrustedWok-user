<aside class="sidebar" [class.collapsed]="collapsed">
    <!-- Logo -->
    <div class="logo-area">
        <div class="logo-mark">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
                <defs>
                    <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
                        <stop offset="0%" stop-color="#22D3EE" />
                        <stop offset="100%" stop-color="#0891B2" />
                    </linearGradient>
                </defs>
                <rect width="32" height="32" rx="9" fill="url(#lg)" />
                <path d="M10 12h12M10 16h8M10 20h10" stroke="#0f0f14" stroke-width="2.2" stroke-linecap="round" />
            </svg>
        </div>
        <div class="logo-text" *ngIf="!collapsed">
            <span class="logo-title">TrustedWork</span>
            <span class="logo-sub">Backoffice</span>
        </div>
    </div>

    <!-- Collapse toggle -->
    <button class="collapse-btn" (click)="toggleCollapse()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline *ngIf="!collapsed" points="15 18 9 12 15 6"></polyline>
            <polyline *ngIf="collapsed" points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>

    <!-- Menu Section -->
    <nav class="nav-block nav-main">
        <div class="nav-heading" *ngIf="!collapsed">
            <span>Menu</span>
        </div>
        <div class="nav-heading-dot" *ngIf="collapsed"><span></span></div>

        <a *ngFor="let item of menuItems; let i = index" class="sidebar-item" [class.active]="activeItem === item.id"
            (click)="setActive(item.id)" [title]="collapsed ? item.label : ''" [style.--delay]="(i * 30) + 'ms'">
            <div class="item-pill">
                <span class="item-indicator"
                    [style.background]="activeItem === item.id ? roleColor : 'transparent'"></span>
                <span class="item-icon-wrap" [style.--accent]="roleColor">
                    <!-- grid -->
                    <svg *ngIf="item.icon==='grid'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="2" />
                        <rect x="14" y="3" width="7" height="7" rx="2" />
                        <rect x="3" y="14" width="7" height="7" rx="2" />
                        <rect x="14" y="14" width="7" height="7" rx="2" />
                    </svg>
                    <!-- users -->
                    <svg *ngIf="item.icon==='users'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <!-- briefcase -->
                    <svg *ngIf="item.icon==='briefcase'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                    </svg>
                    <!-- file-text -->
                    <svg *ngIf="item.icon==='file-text'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    <!-- credit-card -->
                    <svg *ngIf="item.icon==='credit-card'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                        <line x1="1" y1="10" x2="23" y2="10" />
                    </svg>
                    <!-- bar-chart -->
                    <svg *ngIf="item.icon==='bar-chart'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="20" x2="12" y2="10" />
                        <line x1="18" y1="20" x2="18" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="16" />
                    </svg>
                    <!-- user-cog -->
                    <svg *ngIf="item.icon==='user-cog'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="8.5" cy="7" r="4" />
                        <circle cx="19" cy="14" r="2" />
                        <path d="M19 10v1m0 6v1m-3-5.5l.87.5m4.26 2.5l.87.5m-6 0l.87-.5m4.26-2.5l.87-.5" />
                    </svg>
                    <!-- send -->
                    <svg *ngIf="item.icon==='send'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                    <!-- user -->
                    <svg *ngIf="item.icon==='user'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <!-- plus-circle -->
                    <svg *ngIf="item.icon==='plus-circle'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    <!-- list -->
                    <svg *ngIf="item.icon==='list'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    <!-- building -->
                    <svg *ngIf="item.icon==='building'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="1" />
                        <line x1="9" y1="6" x2="9.01" y2="6" />
                        <line x1="15" y1="6" x2="15.01" y2="6" />
                        <line x1="9" y1="10" x2="9.01" y2="10" />
                        <line x1="15" y1="10" x2="15.01" y2="10" />
                        <line x1="9" y1="14" x2="9.01" y2="14" />
                        <line x1="15" y1="14" x2="15.01" y2="14" />
                        <path d="M9 22v-4h6v4" />
                    </svg>
                    <!-- clipboard -->
                    <svg *ngIf="item.icon==='clipboard'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                    </svg>
                    <!-- alert-triangle -->
                    <svg *ngIf="item.icon==='alert-triangle'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    <!-- help-circle -->
                    <svg *ngIf="item.icon==='help-circle'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    <!-- settings -->
                    <svg *ngIf="item.icon==='settings'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </span>
                <span class="item-label" *ngIf="!collapsed">{{ item.label }}</span>
                <span class="item-badge" *ngIf="!collapsed && item.id === 'candidates'">4</span>
            </div>
        </a>
    </nav>

    <!-- Support Section -->
    <nav class="nav-block nav-support">
        <div class="nav-heading" *ngIf="!collapsed">
            <span>Support</span>
        </div>
        <div class="nav-heading-dot" *ngIf="collapsed"><span></span></div>

        <a *ngFor="let item of supportItems" class="sidebar-item" [class.active]="activeItem === item.id"
            (click)="setActive(item.id)" [title]="collapsed ? item.label : ''">
            <div class="item-pill">
                <span class="item-indicator"
                    [style.background]="activeItem === item.id ? roleColor : 'transparent'"></span>
                <span class="item-icon-wrap" [style.--accent]="roleColor">
                    <svg *ngIf="item.icon==='help-circle'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    <svg *ngIf="item.icon==='settings'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <svg *ngIf="item.icon==='user'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <svg *ngIf="item.icon==='building'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="1" />
                        <line x1="9" y1="6" x2="9.01" y2="6" />
                        <line x1="15" y1="6" x2="15.01" y2="6" />
                        <line x1="9" y1="10" x2="9.01" y2="10" />
                        <line x1="15" y1="10" x2="15.01" y2="10" />
                        <line x1="9" y1="14" x2="9.01" y2="14" />
                        <line x1="15" y1="14" x2="15.01" y2="14" />
                        <path d="M9 22v-4h6v4" />
                    </svg>
                </span>
                <span class="item-label" *ngIf="!collapsed">{{ item.label }}</span>
            </div>
        </a>
    </nav>

    <!-- Logout -->
    <div class="sidebar-bottom">
        <a class="sidebar-item logout-item" [title]="collapsed ? 'Déconnexion' : ''">
            <div class="item-pill">
                <span class="item-icon-wrap logout-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </span>
                <span class="item-label" *ngIf="!collapsed">Déconnexion</span>
            </div>
        </a>
    </div>
</aside>
