<div class="auth-page">
  <div class="auth-card">
    <span class="auth-badge">Reset password</span>
    <h1>Forgot password?</h1>
    <p class="subtitle">Enter your email and we’ll send you a reset link (if the account exists).</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']">
          Email is required
        </span>
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
          Enter a valid email
        </span>
      </div>
      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Sending…' : 'Send reset link' }}
      </button>
    </form>
    <p class="footer"><a routerLink="/auth/login">Back to sign in</a></p>
  </div>
</div>
