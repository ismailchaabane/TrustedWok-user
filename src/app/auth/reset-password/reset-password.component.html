<div class="auth-page">
  <div class="auth-card">
    <span class="auth-badge">Set new password</span>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your new password below.</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="token">
      <div class="field">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" formControlName="newPassword" placeholder="••••••••" autocomplete="new-password" />
        <span class="error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['required']">Required</span>
        <span class="error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['minlength']">At least 8 characters</span>
        <span class="error" *ngIf="form.get('newPassword')?.touched && (form.get('newPassword')?.errors?.['passwordLower'] || form.get('newPassword')?.errors?.['passwordUpper'] || form.get('newPassword')?.errors?.['passwordDigit'] || form.get('newPassword')?.errors?.['passwordSpecial'])">Use upper, lower, number and special character</span>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
        <span class="error" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['mismatch']">Passwords do not match</span>
      </div>
      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <button type="submit" [disabled]="loading">{{ loading ? 'Updating…' : 'Update password' }}</button>
    </form>
    <p class="error-msg" *ngIf="!token && errorMessage">{{ errorMessage }}</p>
    <p class="footer"><a routerLink="/auth/login">Back to sign in</a></p>
  </div>
</div>
